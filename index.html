<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Blessings | Singapore</title>
    <style>
        :root { --gold: #c5a059; --teal: #1a3a3a; --cream: #fdfaf5; }
        body { font-family: 'Georgia', serif; margin: 0; padding: 0; background-color: var(--cream); color: var(--teal); text-align: center; }
        header { background: var(--teal); color: var(--gold); padding: 30px; border-bottom: 4px solid var(--gold); }
        .logo { font-size: 28px; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h2 { font-style: italic; margin-top: 40px; border-bottom: 1px solid var(--gold); display: inline-block; }
        .oracle-box { background: white; padding: 30px; border-radius: 15px; border: 1px solid #ddd; margin: 20px 0; }
        .spread { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .card-slot { width: 130px; min-height: 220px; background: #eee; border-radius: 8px; padding: 5px; border: 1px solid #ccc; }
        .card-slot img { width: 100%; display: none; border-radius: 5px; animation: fadeIn 0.8s; }
        .card-name { font-size: 11px; font-weight: bold; margin-top: 5px; min-height: 30px; line-height: 1.2; }
        .pos-label { font-size: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        .btn { background: var(--teal); color: var(--gold); padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 16px; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header><div class="logo">Divine Blessings</div></header>

    <div class="container">
        <section id="free-reading">
            <h2>Full 78-Card Spirit Spread</h2>
            <p>Focus on your energy. This deck now contains all Major and Minor Arcana.</p>
            <div class="oracle-box">
                <div class="spread">
                    <div class="card-slot" id="s0"><div class="pos-label">Present</div><img><div class="card-name"></div></div>
                    <div class="card-slot" id="s1"><div class="pos-label">Obstacle</div><img><div class="card-name"></div></div>
                    <div class="card-slot" id="s2"><div class="pos-label">Past</div><img><div class="card-name"></div></div>
                    <div class="card-slot" id="s3"><div class="pos-label">Future</div><img><div class="card-name"></div></div>
                    <div class="card-slot" id="s4"><div class="pos-label">Outcome</div><img><div class="card-name"></div></div>
                </div>
                <button class="btn" style="width: auto;" onclick="drawFive()">Draw 5 Cards</button>
            </div>
        </section>
    </div>
