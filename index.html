<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Blessings | Sacred Oracle Guidance</title>
    <style>
        :root { --gold: #c5a059; --teal: #1a3a3a; --cream: #fdfaf5; --white: #ffffff; }
        body { font-family: 'Palatino', 'Georgia', serif; margin: 0; background: var(--cream); color: var(--teal); text-align: center; line-height: 1.6; }
        header { background: var(--teal); color: var(--gold); padding: 50px 20px; border-bottom: 5px solid var(--gold); }
        .logo { font-size: 32px; letter-spacing: 5px; text-transform: uppercase; font-weight: bold; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        .oracle-box { background: var(--white); padding: 40px 10px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 50px; }
        .spread { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin: 30px 0; min-height: 400px; }
        .card-slot { width: 160px; min-height: 380px; background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 10px; }
        .card-slot img { width: 100%; border-radius: 8px; display: none; border: 1px solid var(--gold); animation: fadeIn 1s forwards; }
        .card-name { font-size: 14px; font-weight: bold; margin-top: 12px; color: var(--teal); }
        .card-msg { font-size: 11px; font-style: italic; color: #666; margin-top: 5px; display: none; }
        .pos-label { font-size: 10px; color: var(--gold); text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: block; }

        .services { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 40px 0; }
        .s-card { background: white; border: 2px solid var(--gold); padding: 30px; border-radius: 15px; }
        .price { font-size: 32px; font-weight: bold; margin: 15px 0; color: var(--teal); }
        
        .paynow { background: #fff1f1; border: 2px dashed #b12a2a; padding: 30px; border-radius: 15px; margin: 40px 0; }
        .num { font-size: 38px; font-weight: bold; color: #b12a2a; display: block; margin: 10px 0; }
        form { background: white; padding: 30px; border-radius: 15px; text-align: left; border: 1px solid #eee; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn { background: var(--teal); color: var(--gold); padding: 18px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 16px; margin-top: 20px; text-decoration: none; display: inline-block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">Divine Blessings</div>
    <div style="color:white; font-size: 12px; letter-spacing: 2px;">INTUITIVE ORACLE GUIDANCE</div>
</header>

<div class="container">
    <section>
        <h2>Reveal My Destiny</h2>
        <div class="oracle-box">
            <div class="spread">
                <div class="card-slot" id="s0"><span class="pos-label">Present</span><img><div class="card-name"></div><div class="card-msg"></div></div>
                <div class="card-slot" id="s1"><span class="pos-label">Challenge</span><img><div class="card-name"></div><div class="card-msg"></div></div>
                <div class="card-slot" id="s2"><span class="pos-label">Root</span><img><div class="card-name"></div><div class="card-msg"></div></div>
                <div class="card-slot" id="s3"><span class="pos-label">Future</span><img><div class="card-name"></div><div class="card-msg"></div></div>
                <div class="card-slot" id="s4"><span class="pos-label">Outcome</span><img><div class="card-name"></div><div class="card-msg"></div></div>
            </div>
            <button class="btn" onclick="draw()">Shuffle & Reveal Cards</button>
        </div>
    </section>

    <div class="services">
        <div class="s-card"><h3>Mini Reading</h3><div class="price">SGD 18</div><a href="#booking" class="btn">Book Now
