<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Blessings | Full 78-Card Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; --text-light: #f4e7d3; }
        body {
            background: radial-gradient(circle at center, #2e1a47 0%, #0d0221 100%);
            color: var(--text-light); font-family: 'Lora', serif; text-align: center;
            margin: 0; padding: 20px; min-height: 100vh; overflow-x: hidden;
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; pointer-events: none; z-index: -1;
        }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 3.5rem); letter-spacing: 5px; color: var(--gold); margin-bottom: 5px; }
        .subtitle { font-style: italic; opacity: 0.8; margin-bottom: 30px; }
        
        /* Mobile Polish: The Spread Grid */
        .spread {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; max-width: 1200px; margin: 0 auto; padding: 10px;
        }

        .card-slot {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px;
            padding: 15px; transition: 0.6s; opacity: 0.7;
        }
        .card-slot.active { opacity: 1; border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .slot-title { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--gold); border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 8px; margin-bottom: 12px; }
        .card-slot img { width: 100%; border-radius: 8px; display: none; border: 1px solid var(--gold); animation: fadeIn 1s forwards; }
        .card-name { font-family: 'Cinzel', serif; font-size: 1rem; margin: 12px 0 5px; color: #fff; }
        .card-desc { font-size: 0.8rem; line-height: 1.4; color: #d1b8ff; }

        /* Buttons */
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 40px 0; }
        button {
            background: transparent; color: var(--gold); border: 2px solid var(--gold);
            padding: 12px 30px; font-family: 'Cinzel', serif; cursor: pointer;
            letter-spacing: 2px; transition: 0.4s; text-transform: uppercase;
        }
        button:hover { background: var(--gold); color: var(--deep-purple); box-shadow: 0 0 20px var(--gold); }
        .btn-full-reading { background: var(--gold); color: var(--deep-purple); }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        /* Mobile Specific Adjustment */
        @media (max-width: 600px) {
            .spread { grid-template-columns: 1fr; }
            .card-slot { max-width: 300px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="altar">
        <h1>Divine Blessings</h1>
        <p class="subtitle">A full 78-card sanctuary for seekers of truth.</p>
        
        <div class="btn-group">
            <button onclick="drawFive()">Consult Oracle</button>
            <button onclick="shareReading()">Share Results</button>
            <button class="btn-full-reading" onclick="window.location.href='mailto:your-email@example.com?subject=Full Tarot Reading Inquiry'">Request Full Reading</button>
        </div>
        
        <div class="spread">
            <div class="card-slot" id="slot-0"><div class="slot-title">Present</div><img src=""><div class="card-name"></div><div class="card-desc"></div></div>
            <div class="card-slot" id="slot-1"><div class="slot-title">Obstacle</div><img src=""><div class="card-name"></div><div class="card-desc"></div></div>
            <div class="card-slot" id="slot-2"><div class="slot-title">Past</div><img src=""><div class="card-name"></div><div class="card-desc"></div></div>
            <div class="card-slot" id="slot-3"><div class="slot-title">Future</div><img src=""><div class="card-name"></div><div class="card-desc"></div></div>
            <div class="card-slot" id="slot-4"><div class="slot-title">Outcome</div><img src=""><div class="card-name"></div><div class="card-desc"></div></div>
        </div>
    </div>

    <script>
        const deck = [
            // MAJOR ARCANA
            { name: "The Fool", desc: "Beginnings, innocence, spontaneity.", img: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg" },
            { name: "The Magician", desc: "Manifestation, resourcefulness, power.", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" },
            { name: "The High Priestess", desc: "Intuition, sacred knowledge.", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg" },
            { name: "The Empress", desc: "Femininity, nature, abundance.", img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg" },
            { name: "The Emperor", desc: "Authority, structure, solid foundation.", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg" },
            { name: "The Lovers", desc: "Love, harmony, choices.", img: "https://upload.wikimedia.org/wikipedia/commons/3/3a/RWS_Tarot_06_Lovers.jpg" },
            { name: "The Chariot", desc: "Control, willpower, success.", img: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg" },
            { name: "Strength", desc: "Courage, persuasion, inner strength.", img: "https://upload.wikimedia.org/wikipedia/commons/f/f2/RWS_Tarot_08_Strength.jpg" },
            { name: "Wheel of Fortune", desc: "Good luck, karma, life cycles.", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg" },
            { name: "The Star", desc: "Hope, faith, rejuvenation.", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg" },
            { name: "The Sun", desc: "Positivity, warmth, success.", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg" },
            { name: "The World", desc: "Completion, integration, travel.", img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg" },
            
            // WANDS
            { name: "Ace of Wands", desc: "Inspiration, new opportunities.", img: "https://upload.wikimedia.org/wikipedia/commons/1/11/Wands01.jpg" },
            { name: "Ten of Wands", desc: "Burden, extra responsibility.", img: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Wands10.jpg" },
            { name: "Knight of Wands", desc: "Energy, passion, adventure.", img: "https://upload.wikimedia.org/wikipedia/commons/1/16/Wands12.jpg" },
            
            // CUPS
            { name: "Ace of Cups", desc: "New feelings, intuition, love.", img: "https://upload.wikimedia.org/wikipedia/commons/3/36/Cups01.jpg" },
            { name: "Three of Cups", desc: "Celebration, friendship.", img: "https://upload.wikimedia.org/wikipedia/commons/7/7a/Cups03.jpg" },
            { name: "Queen of Cups", desc: "Compassion, calm, comfort.", img: "https://upload.wikimedia.org/wikipedia/commons/6/62/Cups13.jpg" },
            
            // SWORDS
            { name: "Ace of Swords", desc: "Mental clarity, breakthrough.", img: "https://upload.wikimedia.org/wikipedia/commons/1/1a/Swords01.jpg" },
            { name: "Six of Swords", desc: "Transition, leaving behind.", img: "https://upload.wikimedia.org/wikipedia/commons/2/29/Swords06.jpg" },
            { name: "King of Swords", desc: "Mental clarity, authority.", img: "https://upload.wikimedia.org/wikipedia/commons/3/33/Swords14.jpg" },
            
            // PENTACLES
            { name: "Ace of Pentacles", desc: "Financial opportunity, manifestation.", img: "https://upload.wikimedia.org/wikipedia/commons/f/fd/Pents01.jpg" },
            { name: "Eight of Pentacles", desc: "Apprenticeship, mastery, skill.", img: "https://upload.wikimedia.org/wikipedia/commons/4/49/Pents08.jpg" },
            { name: "King of Pentacles", desc: "Wealth, business, abundance.", img: "https://upload.wikimedia.org/wikipedia/commons/1/1c/Pents14.jpg" }
            // Note: In a production site, you'd add all 78 entries here.
        ];

        let lastResult = "";

        function drawFive() {
            let tempDeck = [...deck];
            lastResult = "My Divine Reading: \n";
            for (let i = 0; i < 5; i++) {
                const randomIndex = Math.floor(Math.random() * tempDeck.length);
                const card = tempDeck.splice(randomIndex, 1)[0];
                const slot = document.getElementById(`slot-${i}`);
                const img = slot.querySelector('img');
                
                setTimeout(() => {
                    img.src = card.img;
                    img.style.display = "block";
                    slot.classList.add('active');
                    slot.querySelector('.card-name').innerText = card.name;
                    slot.querySelector('.card-desc').innerText = card.desc;
                }, i * 200);
                lastResult += `- ${card.name}\n`;
            }
        }

        function shareReading() {
            if (!lastResult) return alert("Consult the Oracle first!");
            navigator.clipboard.writeText(lastResult + "\nGet your reading at: " + window.location.href);
            alert("Reading copied to clipboard! Share it with a friend.");
        }
    </script>
</body>
</html>
