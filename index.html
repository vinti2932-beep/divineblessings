<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Blessings | Full 78-Card Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; --text-light: #f4e7d3; }
        body {
            background: radial-gradient(circle at center, #2e1a47 0%, #0d0221 100%);
            color: var(--text-light); font-family: 'Lora', serif; text-align: center;
            margin: 0; padding: 20px; min-height: 100vh; overflow-x: hidden;
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; pointer-events: none; z-index: -1;
        }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 3.5rem); letter-spacing: 5px; color: var(--gold); margin-bottom: 5px; }
        .subtitle { font-style: italic; opacity: 0.8; margin-bottom: 30px; }
        
        /* Mobile Polish: The Spread Grid */
        .spread {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; max-width: 1200px; margin: 0 auto; padding: 10px;
        }

        .card-slot {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px;
            padding: 15px; transition: 0.6s; opacity: 0.7;
        }
        .card-slot.active { opacity: 1; border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .slot-title { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--gold); border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 8px; margin-bottom: 12px; }
        .card-slot img { width: 100%; border-radius: 8px; display: none; border: 1px solid var(--gold); animation: fadeIn 1s forwards; }
        .card-name { font-family: 'Cinzel', serif; font-size: 1rem; margin: 12px 0 5px; color: #fff; }
        .card-desc { font-size: 0.8rem; line-height: 1.4; color: #d1b8ff; }
