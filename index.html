<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mystic Soul Tarot</title>

<style>
body {
  background: radial-gradient(circle, #0a0a1f, #000);
  color: #f5d37a;
  font-family: 'Georgia', serif;
  text-align: center;
  margin: 0;
}

h1 {
  margin-top: 30px;
  font-size: 2.5em;
}

p {
  color: #ccc;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 50px;
  flex-wrap: wrap;
}

.card {
  width: 110px;
  height: 170px;
  background: linear-gradient(145deg, #3b0a57, #1a0026);
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: 0.4s;
  box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.card:hover {
  transform: scale(1.05);
}

.revealed {
  background: #000;
}

.result {
  margin: 30px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

#reset {
  background: gold;
  color: #000;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}
#reset:hover {
  background: #f5c242;
}
</style>
</head>

<body>

<h1>🔮 Mystic Soul Tarot</h1>
<p>Focus on your question and pick 5 cards</p>

<div class="cards" id="cards"></div>
<div class="result" id="result"></div>
<button id="reset">Draw Again</button>

<script>
// FULL 78 TAROT DECK
const tarotDeck = [
/* Major Arcana */
"The Fool - New beginnings, innocence",
"The Magician - Manifestation, power",
"The High Priestess - Intuition, mystery",
"The Empress - Abundance, nurturing",
"The Emperor - Authority, stability",
"The Hierophant - Tradition, guidance",
"The Lovers - Love, choices",
"The Chariot - Willpower, victory",
"Strength - Courage, patience",
"The Hermit - Soul searching",
"Wheel of Fortune - Fate, cycles",
"Justice - Truth, fairness",
"The Hanged Man - Surrender, new perspective",
"Death - Transformation, endings",
"Temperance - Balance, harmony",
"The Devil - Attachment, temptation",
"The Tower - Sudden upheaval",
"The Star - Hope, healing",
"The Moon - Illusion, fear",
"The Sun - Success, joy",
"Judgement - Awakening",
"The World - Completion",

/* Cups */
"Ace of Cups - Emotional new beginning",
"Two of Cups - Partnership",
"Three of Cups - Celebration",
"Four of Cups - Contemplation",
"Five of Cups - Regret",
"Six of Cups - Nostalgia",
"Seven of Cups - Illusion, choices",
"Eight of Cups - Walking away",
"Nine of Cups - Wish fulfilled",
"Ten of Cups - Emotional happiness",
"Page of Cups - Creativity",
"Knight of Cups - Romance",
"Queen of Cups - Compassion",
"King of Cups - Emotional balance",

/* Pentacles */
"Ace of Pentacles - Opportunity",
"Two of Pentacles - Balance",
"Three of Pentacles - Teamwork",
"Four of Pentacles - Control",
"Five of Pentacles - Hardship",
"Six of Pentacles - Generosity",
"Seven of Pentacles - Patience",
"Eight of Pentacles - Skill building",
"Nine of Pentacles - Independence",
"Ten of Pentacles - Wealth",
"Page of Pentacles - Learning",
"Knight of Pentacles - Hard work",
"Queen of Pentacles - Practicality",
"King of Pentacles - Success",

/* Swords */
"Ace of Swords - Clarity",
"Two of Swords - Indecision",
"Three of Swords - Heartbreak",
"Four of Swords - Rest",
"Five of Swords - Conflict",
"Six of Swords - Transition",
"Seven of Swords - Deception",
"Eight of Swords - Restriction",
"Nine of Swords - Anxiety",
"Ten of Swords - Betrayal",
"Page of Swords - Curiosity",
"Knight of Swords - Action",
"Queen of Swords - Truth",
"King of Swords - Authority",

/* Wands */
"Ace of Wands - Inspiration",
"Two of Wands - Planning",
"Three of Wands - Expansion",
"Four of Wands - Celebration",
"Five of Wands - Competition",
"Six of Wands - Victory",
"Seven of Wands - Defense",
"Eight of Wands - Speed",
"Nine of Wands - Resilience",
"Ten of Wands - Burden",
"Page of Wands - Exploration",
"Knight of Wands - Energy",
"Queen of Wands - Confidence",
"King of Wands - Leadership"
];

const positions = ["Past", "Present", "Challenge", "Advice", "Outcome"];

let shuffled = tarotDeck.sort(() => 0.5 - Math.random());
let selected = [];

const container = document.getElementById("cards");
const result = document.getElementById("result");

// CREATE 5 CARDS
for (let i = 0; i < 5; i++) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerText = "✨";

  card.onclick = () => {
    if (card.classList.contains("revealed")) return;

    const drawn = shuffled.pop();

    card.classList.add("revealed");
    card.innerText = drawn.split(" - ")[0];

    selected.push(`<b>${positions[i]}:</b> ${drawn}`);

    if (selected.length === 5) {
      result.innerHTML = "<h2>Your Reading</h2>" + selected.join("<br><br>");
    }
  };

  container.appendChild(card);
}

// RESET BUTTON
document.getElementById('reset').onclick = () => {
  selected = [];
  result.innerHTML = '';
  shuffled = tarotDeck.sort(() => 0.5 - Math.random());
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('revealed');
    c.innerText = '✨';
  });
};
</script>

</body>
</html>
