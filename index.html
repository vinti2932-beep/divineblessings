<script src="deck.js"></script>

    <script>
        function drawFive() {
            // Check if deck actually exists to prevent the error
            if (typeof deck === 'undefined') {
                alert("The deck.js file is not connecting. Check the file name!");
                return;
            }

            let tempDeck = [...deck];
            for (let i = 0; i < 5; i++) {
                const randomIndex = Math.floor(Math.random() * tempDeck.length);
                const card = tempDeck.splice(randomIndex, 1)[0];
                
                const slot = document.getElementById(`slot-${i}`);
                slot.querySelector('img').src = card.img;
                slot.querySelector('img').style.display = "block";
                slot.querySelector('.card-name').innerText = card.name;
                slot.querySelector('.card-desc').innerText = card.desc;
                slot.style.background = "rgba(241, 210, 121, 0.1)";
            }
        }
    </script>
