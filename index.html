<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Blessings | Spiritual Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --soft-cream: #fdfaf5;
            --deep-teal: #1a3a3a;
            --text-gray: #4a4a4a;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--soft-cream);
            color: var(--text-gray);
            line-height: 1.6;
        }

        header {
            padding: 30px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: var(--deep-teal);
            text-transform: uppercase;
            font-weight: 700;
            text-decoration: none;
        }

        .hero {
            padding: 120px 10%;
            text-align: center;
            background: radial-gradient(circle, #ffffff 0%, #fdfaf5 100%);
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            color: var(--deep-teal);
            margin-bottom: 10px;
            font-style: italic;
        }

        .hero p {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary-gold);
            margin-bottom: 40px;
        }

        .cta-btn {
            background: var(--primary-gold);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            font-weight: 600;
        }

        .cta-btn:hover {
            background: var(--deep-teal);
            transform: translateY(-2px);
        }

        .services-section { padding: 100px 10%; background: #fff; text-align: center;}
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .service-card {
            background: var(--soft-cream);
            padding: 50px 30px;
            border: 1px solid #f0e6d2;
            transition: 0.4s;
        }

        .service-card:hover { border-color: var(--primary-gold); }

        .
