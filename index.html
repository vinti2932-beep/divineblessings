<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Blessings | Spiritual Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-gold: #c5a059; --soft-cream: #fdfaf5; --deep-teal: #1a3a3a; --text-gray: #4a4a4a; --white: #ffffff; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background-color: var(--soft-cream); color: var(--text-gray); line-height: 1.6; }
        
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--white); border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--deep-teal); text-transform: uppercase; font-weight: 700; text-decoration: none; }

        .hero { padding: 80px 10%; text-align: center; background: #fff; border-bottom: 1px solid #f0e6d2; }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--deep-teal); margin-bottom: 15px; }

        .cta-btn { background: var(--primary-gold); color: white; border: none; padding: 15px 35px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.4s; font-weight: 600; border-radius: 2px; }
        .cta-btn:hover { background: var(--deep-teal); }

        .services-section { padding: 60px 5%; text-align: center; background: #fff; }
        .services-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-top: 30px; }
        .service-card { background: var(--soft-cream); padding: 30px; border: 1px solid #f0e6d2; width: 100%; max-width: 350px; border-radius: 8px; }
        .service-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }

        #booking-section { padding: 60px 5%; background: #fff; border-top: 2px solid var(--primary-gold); }
        .booking-container { max-width: 600px; margin: 0 auto; background: var(--soft-cream); padding: 40px; border-radius: 12px; border: 1px solid #eee; }
        
        .payment-info { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: center; border: 1px solid var(--primary-gold); }
        .paynow-number { font-size: 1.8rem; font-weight: 700; color: var(--deep-teal); letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--primary-gold); margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Montserrat'; }

        .oracle-section { padding: 80px 5%; text-align: center; background: var(--soft-cream); }
        .card-display { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin: 30px 0; min-height: 250px; }
        .card-box { width: 140px; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 5px; }
        .card-box img { width: 100%; display: none; margin-bottom: 10px; }
        
        footer { padding: 40px; text-align: center; background: var(--deep-teal); color: white; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Divine Blessings</div>
    </header>

    <section class="hero">
        <h1>Your Spiritual Journey Starts Here</h1>
        <p style="color: var(--primary-gold); letter-spacing: 2px;">INTUITIVE READINGS & ANCESTRAL WISDOM</p>
        <br>
        <button class="cta-btn" onclick="location.href='#services'">View Readings</button>
    </section>

    <section class="services-section" id="services">

                <p style="font-size: 0.8rem;">A focused insight into one specific question.</p>
                <button class="cta-btn" onclick="selectService('Quick Mini Reading (SGD 18)')">Select This</button>
